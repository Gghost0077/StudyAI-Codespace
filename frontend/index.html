<!-- This is the main GUI file I quickly created a protoype GUI for the StudyAI to
get quickly started on actually buidling the backend # It uses Bootstrap 5 for
styling and layout, and includes a simple form for inputting module information
and availability, # as well as a section to display the generated schedule. The
JavaScript file (app.js) will handle the logic for generating the schedule based
on the inputs provided by the user. -->

<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>StudyAI Dashboard</title>

    <!-- Bootstrap 5 -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Bootstrap Icons (optional) -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />

    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body class="bg-light">
    <!-- Navbar -->
    <nav
      class="navbar navbar-expand-lg navbar-light bg-white border-bottom shadow-sm"
    >
      <div class="container-fluid">
        <a class="navbar-brand" href="#">
          <i class="bi bi-calendar2-check me-2"></i>StudyAI
        </a>
      </div>
    </nav>

    <!-- Dashboard layout -->
    <div class="container-fluid">
      <div class="row">
        <!-- Sidebar (left) -->
        <aside class="col-md-4 col-lg-3 p-3" id="sidebar">
          <div class="card shadow-sm mb-4">
            <div class="card-body">
              <h5 class="card-title">Study Inputs</h5>
              <hr />
          <!-- Module Inputs (Cards) -->
          <div class="card shadow-sm mb-4">
              <div class="card-body">
                    <h5 class="card-title d-flex justify-content-between align-items-center">
                        Study Modules
                    <button class="btn btn-sm btn-outline-primary" id="addModuleBtn">
                        <i class="bi bi-plus-lg"></i>
                </h5>
                <hr />
                    <!-- JS will insert module inputs here -->
                <div id="modulesContainer"></div>
            </div>
          </div>

          <div class="card shadow-sm mb-4"> 
            <div class="card-body"> 
              <h5 class="card-title d-flex justify-content-between align-items-center"> 
                Availability (Study Time) 
                <button class="btn btn-sm btn-outline-primary" id="addAvailabilityBtn"> 
                  <i class="bi bi-plus-lg"></i>
                </button>
              </h5> 
              <hr />
              <!-- JS will insert availability inputs here --> <div id="availabilityContainer"></div> 
             </div> 
            </div>
            
                



              <!-- AI Toggle -->
              <div class="form-check form-switch mb-3">
                <input
                  class="form-check-input"
                  type="checkbox"
                  id="aiEnabled"
                />
                <div class="mb-2">
                  <label class="form-label small" for="aiStrictness">AI strictness</label>
                  <select id="aiStrictness" class="form-select form-select-sm">
                    <option value="low">Low (suggest only)</option>
                    <option value="medium" selected>Medium (suggest + light tweaks)</option>
                    <option value="high">High (stronger suggestions)</option>
                  </select>
                  <div class="form-text small text-muted">
                    AI is optional and should stay within your constraints.
                  </div>
                </div>
                <label class="form-check-label" for="aiEnabled"
                  >Enable AI suggestions</label
                >
              </div>

              <!-- Generate -->
              <button class="btn btn-primary w-100" id="generateBtn">
                <i class="bi bi-magic me-1"></i>Generate Schedule
              </button>
            </div>
          </div>
        </aside>

        <!-- Main area (schedule) -->
        <main class="col-md-8 col-lg-9 p-3">
          <div class="card shadow-sm">
            <div class="card-body">
              <div
                class="d-flex justify-content-between align-items-center mb-3"
              >
                <h5 class="card-title mb-0">Weekly Schedule</h5>
                <button
                  class="btn btn-outline-secondary btn-sm"
                  id="regenerateBtn"
                >
                  <i class="bi bi-arrow-clockwise me-1"></i>Regenerate
                </button>
              </div>

              <div id="scheduleView" class="text-secondary">
                <!-- JS will insert schedule here -->
              </div>
            </div>
          </div>
        </main>
      </div>
    </div>

    <script src="js/app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
